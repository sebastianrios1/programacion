<!DOCTYPE html>
<html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVAS FURIA </title>
    <link rel="stylesheet" href="reserva.css">
</head>
<body>
    <header>
        <H1>HAZ TU RESERVA AQUÍ</H1>
    </header>
        <fieldset>
            <div class="input-group">
            <legend>INGRESA TUS DATOS</legend>
                <input type="text" required placeholder="" >
                <label for="datos" id="datos">Nombre</label>
            </div>
            <br>
            <div class="input-group">
                <input type="number" required step="1" min="1" max="15" placeholder="">
                <label for="cantidad" id="cantidad">Cantidad de personas</label>
            </div>
            <br>
            <div class="input-group">
                <input type="number" required placeholder="">
                <label for="numero" id="num">Numero de Telefono</lable>
            </div>
            <br>
            <div class="input-group">
                <input type="date" required placeholder="">
                <label for="fecha" id="fecha">Seleciona la fecha</label>
            </div>
            <br>
            <div class="input-group">
                <input type="time" required placeholder="">
                <label for="hora" id="hora">Selecciona la hora</label>
            </div>
        </fieldset>
        
    </div>

    <button class="btn-reserva">ACEPTAR</button>


     <section>
            <a href="index.html" style="text-decoration: none;">
                <button type="button" class="btn-card">Pagina Principal</button>
            </a>
            
        </section>
</body>
</html>
